<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SlimBot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-deep: #090b0f;
  --bg-surface: #111318;
  --bg-elevated: #181a1f;
  --bg-glass: rgba(24, 26, 31, 0.72);
  --border-subtle: rgba(255, 255, 255, 0.06);
  --border-accent: rgba(255, 255, 255, 0.1);
  --text-primary: #e8e6e1;
  --text-secondary: #8a8f98;
  --text-muted: #565a63;
  --accent: #c8a45e;
  --accent-soft: rgba(200, 164, 94, 0.12);
  --accent-glow: rgba(200, 164, 94, 0.08);
  --user-bubble: rgba(52, 42, 20, 0.75);
  --user-bubble-border: rgba(200, 164, 94, 0.25);
  --assistant-bubble: rgba(14, 16, 22, 0.85);
  --assistant-bubble-border: rgba(255, 255, 255, 0.05);
  --status-running: #c8a45e;
  --status-done: #4caf6a;
  --status-failed: #d94f55;
  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --radius-xl: 24px;
  --font-body: 'DM Sans', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
}

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  font-family: var(--font-body);
  background: var(--bg-deep);
  color: var(--text-primary);
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
}

/* Subtle noise texture overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 1000;
  opacity: 0.4;
}

/* Ambient glow behind the app */
body::after {
  content: '';
  position: fixed;
  top: -40%;
  left: 50%;
  transform: translateX(-50%);
  width: 700px;
  height: 700px;
  background: radial-gradient(circle, rgba(200, 164, 94, 0.06) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

#app {
  width: 100%;
  height: 100%;
  max-width: 820px;
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
}

/* ─ Chat List View ── */
#chat-select {
  display: flex;
  flex-direction: column;
  height: 100%;
  padding: 2rem 1.5rem;
  animation: fadeUp 0.5s ease both;
}

#chat-select .header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 2rem;
  flex-shrink: 0;
}

#chat-select .header h1 {
  font-family: var(--font-mono);
  font-size: 1.25rem;
  font-weight: 600;
  letter-spacing: -0.02em;
  color: var(--text-primary);
}

#chat-select .header h1 span {
  color: var(--accent);
}

#new-chat {
  font-family: var(--font-body);
  font-size: 0.82rem;
  font-weight: 500;
  padding: 0.55rem 1.1rem;
  border: 1px solid var(--border-accent);
  border-radius: var(--radius-sm);
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s ease;
  letter-spacing: 0.01em;
}

#new-chat:hover {
  background: var(--accent-soft);
  border-color: var(--accent);
  color: var(--accent);
}

#chat-list {
  list-style: none;
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
  padding-bottom: 1rem;
  scrollbar-width: thin;
  scrollbar-color: var(--border-subtle) transparent;
}

#chat-list::-webkit-scrollbar { width: 5px; }
#chat-list::-webkit-scrollbar-track { background: transparent; }
#chat-list::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 10px; }

#chat-list li {
  padding: 1rem 1.15rem;
  border-radius: var(--radius-md);
  cursor: pointer;
  border: 1px solid var(--border-subtle);
  background: var(--bg-glass);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  transition: all 0.25s ease;
  animation: fadeUp 0.4s ease both;
}

#chat-list li:hover {
  border-color: var(--border-accent);
  background: var(--bg-elevated);
  transform: translateX(3px);
}

#chat-list li .chat-id {
  font-family: var(--font-mono);
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text-primary);
  margin-bottom: 0.3rem;
}

#chat-list li .preview {
  font-size: 0.8rem;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

#chat-list li .chat-date {
  font-size: 0.7rem;
  color: var(--text-muted);
  float: right;
  margin-top: 0.15rem;
}

#chat-list .empty-state {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--text-muted);
  font-size: 0.9rem;
  border: none;
  background: none;
}

/* ── Chat View ── */
#view {
  display: none;
  flex-direction: column;
  height: 100%;
  animation: fadeUp 0.35s ease both;
}

#view.active {
  display: flex;
}

.chat-header {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 1rem 1.5rem;
  border-bottom: 1px solid var(--border-subtle);
  flex-shrink: 0;
  background: var(--bg-glass);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}

#back {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 34px;
  height: 34px;
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s ease;
  font-size: 1rem;
  flex-shrink: 0;
}

#back:hover {
  border-color: var(--border-accent);
  color: var(--text-primary);
  background: var(--bg-elevated);
}

#chat-title {
  font-family: var(--font-mono);
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text-primary);
  letter-spacing: 0.01em;
}

#chat-title .dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
  margin-right: 0.5rem;
  vertical-align: middle;
  animation: pulse 2s ease-in-out infinite;
}

/* ── Messages Area ── */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
  scrollbar-width: thin;
  scrollbar-color: var(--border-subtle) transparent;
}

#messages::-webkit-scrollbar { width: 5px; }
#messages::-webkit-scrollbar-track { background: transparent; }
#messages::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 10px; }

.msg {
  max-width: 82%;
  padding: 0.85rem 1.1rem;
  border-radius: var(--radius-lg);
  font-size: 0.88rem;
  line-height: 1.65;
  word-wrap: break-word;
  animation: msgIn 0.35s ease both;
  border: 1px solid var(--border-subtle);
}

.msg.user {
  align-self: flex-end;
  background: var(--user-bubble);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid var(--user-bubble-border);
  color: var(--text-primary);
  border-bottom-right-radius: var(--radius-sm);
  position: relative;
  display: flex;
  align-items: flex-start;
  gap: 0.6rem;
}

.msg.user .user-content {
  flex: 1;
  min-width: 0;
}

/* Status indicator dot on user messages */
.msg.user .status-dot {
  flex-shrink: 0;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  margin-top: 4px;
  margin-left: -2px;
}

.msg.user .status-dot.running {
  background: var(--status-running);
  animation: statusPulse 1.5s ease-in-out infinite;
  box-shadow: 0 0 8px rgba(200, 164, 94, 0.4);
}

.msg.user .status-dot.done {
  background: var(--status-done);
  box-shadow: 0 0 6px rgba(76, 175, 106, 0.3);
}

.msg.user .status-dot.done::after {
  content: '';
  display: block;
  width: 6px;
  height: 3px;
  border-left: 2px solid #090b0f;
  border-bottom: 2px solid #090b0f;
  transform: rotate(-45deg) translate(1px, -1px);
}

.msg.user .status-dot.failed {
  background: var(--status-failed);
  box-shadow: 0 0 6px rgba(217, 79, 85, 0.3);
}

.msg.user .status-dot.failed::after {
  content: '';
  display: block;
  width: 6px;
  height: 6px;
  position: relative;
  top: -3px;
  background: linear-gradient(to right, transparent 40%, #090b0f 40%, #090b0f 60%, transparent 60%),
              linear-gradient(to bottom, transparent 40%, #090b0f 40%, #090b0f 60%, transparent 60%);
}

.msg.assistant {
  align-self: flex-start;
  background: var(--assistant-bubble);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid var(--assistant-bubble-border);
  color: var(--text-primary);
  border-bottom-left-radius: var(--radius-sm);
}

.msg.assistant p { margin-bottom: 0.6rem; }
.msg.assistant p:last-child { margin-bottom: 0; }
.msg.assistant code {
  font-family: var(--font-mono);
  font-size: 0.82em;
  background: rgba(0,0,0,0.35);
  padding: 0.15em 0.4em;
  border-radius: 4px;
  color: var(--accent);
}
.msg.assistant pre {
  background: rgba(0,0,0,0.4);
  padding: 0.85rem 1rem;
  border-radius: var(--radius-sm);
  overflow-x: auto;
  margin: 0.6rem 0;
  border: 1px solid var(--border-subtle);
}
.msg.assistant pre code {
  background: none;
  padding: 0;
  color: var(--text-primary);
  font-size: 0.82rem;
}
.msg.assistant ul, .msg.assistant ol {
  padding-left: 1.25rem;
  margin: 0.4rem 0;
}
.msg.assistant li { margin-bottom: 0.2rem; }
.msg.assistant strong { color: var(--text-primary); font-weight: 600; }
.msg.assistant em { color: var(--text-secondary); }
.msg.assistant h1, .msg.assistant h2, .msg.assistant h3 {
  font-size: 1rem;
  font-weight: 600;
  margin: 0.8rem 0 0.4rem;
  color: var(--text-primary);
}
.msg.assistant blockquote {
  border-left: 2px solid var(--accent);
  padding-left: 0.85rem;
  margin: 0.5rem 0;
  color: var(--text-secondary);
}
.msg.assistant hr {
  border: none;
  border-top: 1px solid var(--border-subtle);
  margin: 0.8rem 0;
}
.msg.assistant a {
  color: var(--accent);
  text-decoration: underline;
  text-decoration-color: rgba(200, 164, 94, 0.3);
  text-underline-offset: 2px;
}
.msg.assistant table {
  border-collapse: collapse;
  width: 100%;
  margin: 0.6rem 0;
  font-size: 0.82rem;
}
.msg.assistant th, .msg.assistant td {
  border: 1px solid var(--border-subtle);
  padding: 0.4rem 0.7rem;
  text-align: left;
}
.msg.assistant th {
  background: rgba(0,0,0,0.3);
  font-weight: 600;
}

/* ── Input Area ── */
.input-area {
  padding: 1rem 1.5rem 1.25rem;
  flex-shrink: 0;
  border-top: 1px solid var(--border-subtle);
  background: var(--bg-glass);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}

#input-form {
  display: flex;
  gap: 0.6rem;
  align-items: flex-end;
}

#input-form textarea {
  flex: 1;
  font-family: var(--font-body);
  font-size: 0.88rem;
  line-height: 1.5;
  padding: 0.75rem 1rem;
  border: 1px solid var(--border-accent);
  border-radius: var(--radius-md);
  background: var(--bg-surface);
  color: var(--text-primary);
  resize: none;
  min-height: 46px;
  max-height: 150px;
  outline: none;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
}

#input-form textarea::placeholder {
  color: var(--text-muted);
}

#input-form textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

#send-btn {
  font-family: var(--font-body);
  font-size: 0.82rem;
  font-weight: 600;
  padding: 0.75rem 1.4rem;
  border: none;
  border-radius: var(--radius-md);
  background: var(--accent);
  color: var(--bg-deep);
  cursor: pointer;
  transition: all 0.2s ease;
  letter-spacing: 0.02em;
  white-space: nowrap;
  height: 46px;
  display: flex;
  align-items: center;
  justify-content: center;
}

#send-btn:hover {
  filter: brightness(1.1);
  transform: translateY(-1px);
}

#send-btn:active {
  transform: translateY(0);
}

#send-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none;
  filter: none;
}

/* ── Typing indicator ── */
.typing-indicator {
  display: flex;
  gap: 0.35rem;
  padding: 0.75rem 1.1rem;
  align-self: flex-start;
  animation: msgIn 0.35s ease both;
}

.typing-indicator span {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--text-muted);
  animation: typingBounce 1.2s ease-in-out infinite;
}

.typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.3s; }

/* ── Agent event cards ── */
.event-card {
  align-self: flex-start;
  max-width: 82%;
  border-radius: var(--radius-md);
  border: 1px solid var(--border-subtle);
  background: rgba(17, 19, 24, 0.6);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  padding: 0.6rem 0.9rem;
  font-size: 0.8rem;
  animation: msgIn 0.3s ease both;
}

.event-card.tool-call {
  border-left: 2px solid var(--accent);
}

.event-card.tool-result {
  border-left: 2px solid var(--status-done);
}

.event-card .event-header {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 0.3rem;
}

.event-card .event-icon {
  font-size: 0.75rem;
  color: var(--accent);
}

.event-card .event-name {
  font-family: var(--font-mono);
  font-weight: 500;
  color: var(--text-primary);
  font-size: 0.82rem;
}

.event-card .event-args,
.event-card .event-output {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  background: rgba(0, 0, 0, 0.25);
  padding: 0.3rem 0.5rem;
  border-radius: 4px;
  margin-top: 0.25rem;
  word-break: break-all;
}

.event-card .event-args {
  color: var(--text-secondary);
}

.event-card .event-output {
  color: var(--text-muted);
  max-height: 120px;
  overflow-y: auto;
  white-space: pre-wrap;
}

.event-card.assistant-message {
  border-left: 2px solid rgba(200, 164, 94, 0.4);
}

.event-card.assistant-message .event-content {
  font-size: 0.84rem;
  line-height: 1.5;
  color: var(--text-primary);
}

.event-card.iteration {
  border-left: 2px solid var(--border-subtle);
  opacity: 0.6;
}

.event-card.iteration .event-name {
  color: var(--text-muted);
  font-size: 0.72rem;
}

.event-card.task-completed {
  border-left: 2px solid var(--status-done);
  opacity: 0.7;
}

.event-card.task-failed {
  border-left: 2px solid var(--status-failed);
}

/* ─ Animations ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(8px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

@keyframes statusPulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-5px); }
}

/* ── Responsive ─ */
@media (max-width: 600px) {
  #app { max-width: 100%; }
  #chat-select { padding: 1.25rem 1rem; }
  #messages { padding: 1rem; }
  .input-area { padding: 0.75rem 1rem 1rem; }
  .msg { max-width: 90%; font-size: 0.85rem; }
}
</style>
</head>
<body>
<div id="app">
  <!-- Chat List -->
  <div id="chat-select">
    <div class="header">
      <h1>slim<span>bot</span></h1>
      <button id="new-chat">+ New Chat</button>
    </div>
    <ul id="chat-list"></ul>
  </div>

  <!-- Chat View -->
  <div id="view">
    <div class="chat-header">
      <button id="back" aria-label="Back">&#8592;</button>
      <div id="chat-title"></div>
    </div>
    <div id="messages"></div>
    <div class="input-area">
      <form id="input-form">
        <textarea id="input" placeholder="Message SlimBot..." rows="1"></textarea>
        <button type="submit" id="send-btn">Send</button>
      </form>
    </div>
  </div>
</div>

<script>
marked.setOptions({ breaks: true, gfm: true });

let currentChat = null;
let evtSource = null;
let isProcessing = false;
let activeUserDot = null;

function formatTimestamp(ms) {
  const d = new Date(ms);
  const now = new Date();
  const diff = now - d;
  if (diff < 86400000) return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  if (diff < 604800000) return d.toLocaleDateString([], { weekday: 'short' });
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
}

function scrollToBottom() {
  const c = document.getElementById('messages');
  c.scrollTop = c.scrollHeight;
}

function resetProcessingState() {
  hideTyping();
  isProcessing = false;
  updateSendButton();
}

function setUserDotState(state) {
  if (!activeUserDot) return;
  activeUserDot.status = state;
  activeUserDot.dot.className = 'status-dot ' + state;
}

async function loadChats() {
  try {
    const res = await fetch('/chats');
    const chats = await res.json();
    const list = document.getElementById('chat-list');
    list.innerHTML = '';
    if (chats.length === 0) {
      list.innerHTML = '<li class="empty-state">No conversations yet.<br>Start a new chat to begin.</li>';
      return;
    }
    chats.forEach((c, i) => {
      const li = document.createElement('li');
      li.style.animationDelay = `${i * 0.04}s`;
      const dateSpan = document.createElement('span');
      dateSpan.className = 'chat-date';
      dateSpan.textContent = formatTimestamp(c.created_at_ms);
      const idSpan = document.createElement('div');
      idSpan.className = 'chat-id';
      idSpan.textContent = c.chat_id;
      const preview = document.createElement('div');
      preview.className = 'preview';
      preview.textContent = c.message_count > 0 ? c.message_count + ' message' + (c.message_count > 1 ? 's' : '') : 'New chat';
      li.appendChild(dateSpan);
      li.appendChild(idSpan);
      li.appendChild(preview);
      li.onclick = () => enterChat(c.chat_id);
      list.appendChild(li);
    });
  } catch (err) {
    console.error('loadChats error:', err);
  }
}

async function newChat() {
  try {
    const res = await fetch('/chats', { method: 'POST' });
    const chat = await res.json();
    enterChat(chat);
  } catch (err) {
    console.error('newChat error:', err);
  }
}

function renderMarkdown(text) {
  try {
    return marked.parse(text);
  } catch {
    return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
  }
}

function appendMessage(role, content, animate = true) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const dot = document.createElement('div');
  const span = document.createElement('div');
  span.className = 'user-content';

  if (role === 'user') {
    dot.className = 'status-dot done';
    span.textContent = content;
    div.appendChild(dot);
    div.appendChild(span);
    container.appendChild(div);
    scrollToBottom();
    return { el: div, dot, status: 'done' };
  }
  div.innerHTML = renderMarkdown(content);
  if (!animate) div.style.animation = 'none';
  container.appendChild(div);
  scrollToBottom();
  return { el: div, dot, status: 'done' };
}

function showTyping() {
  const container = document.getElementById('messages');
  if (container.querySelector('.typing-indicator')) return;
  const div = document.createElement('div');
  div.className = 'typing-indicator';
  div.innerHTML = '<span></span><span></span><span></span>';
  container.appendChild(div);
  scrollToBottom();
}

function hideTyping() {
  const container = document.getElementById('messages');
  const indicator = container.querySelector('.typing-indicator');
  if (indicator) indicator.remove();
}

async function loadHistory(chatId) {
  try {
    const res = await fetch('/session/' + encodeURIComponent(chatId));
    if (!res.ok) return;
    const messages = await res.json();
    const container = document.getElementById('messages');
    container.innerHTML = '';
    messages.forEach((m, i) => {
      const result = appendMessage(m.role, m.content, false);
      result.el.style.animationDelay = `${Math.min(i * 0.06, 0.5)}s`;
      result.el.style.animation = 'msgIn 0.35s ease both';
    });
    scrollToBottom();
  } catch (err) {
    console.error('loadHistory error:', err);
  }
}

function enterChat(chatId) {
  currentChat = chatId;
  isProcessing = false;
  activeUserDot = null;

  document.getElementById('chat-select').style.display = 'none';
  const view = document.getElementById('view');
  view.style.display = 'flex';
  view.classList.add('active');
  document.getElementById('chat-title').innerHTML = '<span class="dot"></span>' + chatId;

  if (evtSource) evtSource.close();

  let accumulated = '';
  let currentMsgEl = null;

  evtSource = new EventSource('/sse?chat_id=' + encodeURIComponent(chatId));
  let responseReceived = false;
  let streamClosed = false;

  function onStreamDone() {
    if (streamClosed) return;
    streamClosed = true;
    hideTyping();
    isProcessing = false;
    updateSendButton();
    setUserDotState(responseReceived ? 'done' : 'failed');
    activeUserDot = null;
    if (evtSource) evtSource.close();
  }

  evtSource.onmessage = (e) => {
    hideTyping();
    const data = e.data;
    if (data.startsWith('<thinking>') || data.includes('[AgentRunner]')) return;

    responseReceived = true;

    if (!currentMsgEl) {
      currentMsgEl = appendMessage('assistant', '', false);
      accumulated = '';
    }

    accumulated += data;
    currentMsgEl.el.innerHTML = renderMarkdown(accumulated);
    scrollToBottom();

    // Server closes the SSE stream after sending the result, so close the
    // client EventSource to prevent auto-reconnect and mark completion.
    onStreamDone();
  };

  evtSource.addEventListener('agent_event', (e) => {
    try {
      const event = JSON.parse(e.data);
      handleAgentEvent(event);
    } catch (err) {
      console.warn('Failed to parse agent_event:', err);
    }
  });

  function handleAgentEvent(event) {
    switch (event.type) {
      case 'task_started':
        setUserDotState('running');
        break;

      case 'task_completed':
        setUserDotState('done');
        hideTyping();
        isProcessing = false;
        updateSendButton();
        activeUserDot = null;
        break;

      case 'task_failed':
        setUserDotState('failed');
        hideTyping();
        isProcessing = false;
        updateSendButton();
        activeUserDot = null;
        appendEventCard('task-failed', 'Task failed', event.error || '');
        break;

      case 'pre_iteration':
        appendEventCard('iteration', 'Iteration ' + event.iteration);
        break;

      case 'assistant_message':
        hideTyping();
        if (!currentMsgEl) {
          currentMsgEl = appendMessage('assistant', '', false);
          accumulated = '';
        }
        accumulated += event.content;
        currentMsgEl.el.innerHTML = renderMarkdown(accumulated);
        scrollToBottom();
        break;

      case 'tool_call': {
        const card = appendEventCard('tool-call', event.name, formatArgs(event.args));
        card.dataset.toolName = event.name;
        break;
      }

      case 'tool_result': {
        // Find the most recent tool_call card with matching name and update it
        updateToolResult(event.name, event.output);
        break;
      }
    }
  }

  function formatArgs(args) {
    try {
      const parsed = JSON.parse(args);
      return JSON.stringify(parsed, null, 2);
    } catch {
      return args;
    }
  }

  function appendEventCard(type, name, detail) {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'event-card ' + type;

    const header = document.createElement('div');
    header.className = 'event-header';

    const icon = document.createElement('span');
    icon.className = 'event-icon';
    icon.textContent = type === 'tool-call' ? '▶' : type === 'tool-result' ? '✓' : '○';

    const nameEl = document.createElement('span');
    nameEl.className = 'event-name';
    nameEl.textContent = name;

    header.appendChild(icon);
    header.appendChild(nameEl);
    div.appendChild(header);

    if (detail) {
      const detailEl = document.createElement('div');
      detailEl.className = type === 'tool-call' ? 'event-args' :
                           type === 'tool-result' ? 'event-output' :
                           'event-content';
      detailEl.textContent = detail;
      div.appendChild(detailEl);
    }

    container.appendChild(div);
    scrollToBottom();
    return div;
  }

  function updateToolResult(toolName, output) {
    // Find the most recent tool_call card without a result
    const container = document.getElementById('messages');
    const cards = container.querySelectorAll('.event-card.tool-call');
    for (let i = cards.length - 1; i >= 0; i--) {
      if (cards[i].dataset.toolName === toolName && !cards[i].querySelector('.event-output')) {
        // Convert to tool-result style
        cards[i].className = 'event-card tool-result';
        const icon = cards[i].querySelector('.event-icon');
        if (icon) icon.textContent = '✓';

        const outputEl = document.createElement('div');
        outputEl.className = 'event-output';
        outputEl.textContent = output.length > 500 ? output.slice(0, 500) + '\n... (truncated)' : output;
        cards[i].appendChild(outputEl);
        scrollToBottom();
        break;
      }
    }
  }

  evtSource.onerror = () => {
    // Fires on network errors or server restarts — not on normal close
    // since the server drops the sender and the stream ends cleanly.
    // Only reset state if we haven't already completed normally.
    if (!streamClosed) {
      hideTyping();
      isProcessing = false;
      updateSendButton();
      setUserDotState('failed');
      activeUserDot = null;
    }
  };

  loadHistory(chatId);
  document.getElementById('input').focus();
}

function updateSendButton() {
  const btn = document.getElementById('send-btn');
  btn.disabled = isProcessing;
  btn.textContent = isProcessing ? '...' : 'Send';
}

document.getElementById('new-chat').onclick = newChat;

document.getElementById('back').onclick = () => {
  if (evtSource) { evtSource.close(); evtSource = null; }
  currentChat = null;
  isProcessing = false;
  activeUserDot = null;
  hideTyping();
  document.getElementById('chat-select').style.display = 'flex';
  document.getElementById('view').style.display = 'none';
  document.getElementById('view').classList.remove('active');
  loadChats();
};

document.getElementById('input-form').onsubmit = async (e) => {
  e.preventDefault();
  const input = document.getElementById('input');
  const msg = input.value.trim();
  if (!msg || !currentChat || isProcessing) return;

  isProcessing = true;
  updateSendButton();
  input.value = '';

  const userMsg = appendMessage('user', msg);
  activeUserDot = userMsg;
  setUserDotState('running');
  showTyping();

  try {
    const res = await fetch('/message?chat_id=' + encodeURIComponent(currentChat), {
      method: 'POST', body: msg
    });
    if (!res.ok) {
      resetProcessingState();
      setUserDotState('failed');
      activeUserDot = null;
    }
  } catch {
    resetProcessingState();
    setUserDotState('failed');
    activeUserDot = null;
  }
};

const textarea = document.getElementById('input');
textarea.addEventListener('input', () => {
  textarea.style.height = 'auto';
  textarea.style.height = Math.min(textarea.scrollHeight, 150) + 'px';
});

textarea.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    document.getElementById('input-form').dispatchEvent(new Event('submit'));
  }
});

loadChats();
</script>
</body>
</html>
